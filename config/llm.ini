[provider]
# Which LLM provider to use.  Options: gemini, openai
# Override at runtime with the LLM_PROVIDER environment variable.
name = gemini

[common]
temperature = 0.3

[loop]
max_loops             = 12
max_exception_retries = 2

# ---- Provider-specific sections ----

[gemini]
model           = gemini-2.5-flash
thinking_budget = 0

[openai]
model = gpt-4o
